version: '3.9'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: whatsapp-portal-postgres
    environment:
      POSTGRES_DB: whatsapp_portal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-portal-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: whatsapp-portal-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - whatsapp-portal-network

  # ============================================
  # Backend API
  # ============================================
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: whatsapp-portal-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: whatsapp_portal
      DB_USER: postgres
      DB_PASSWORD: postgres_dev_password
      DB_SCHEMA: whatsapp_portal
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 1
      JWT_SECRET: your_super_secret_jwt_key_development_at_least_32_characters_long
      JWT_REFRESH_SECRET: your_super_secret_refresh_token_key_development_at_least_32_characters_long
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your_email@gmail.com
      SMTP_PASSWORD: your_app_password
      ENCRYPTION_KEY: your_encryption_key_at_least_32_characters_development_key
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - whatsapp-portal-network

  # ============================================
  # Frontend Application
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: whatsapp-portal-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
      VITE_ENV: development
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - whatsapp-portal-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  whatsapp-portal-network:
    driver: bridge
