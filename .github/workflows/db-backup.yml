name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # Every day at 2:00 AM UTC
  workflow_dispatch:        # Also allow manual trigger from GitHub UI

jobs:
  backup:
    name: Backup PostgreSQL → Backblaze B2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Install PostgreSQL client tools (pg_dump) ─────────────────────────
      - name: Install pg_dump
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      # ── 2. Resolve host to IPv4 ──────────────────────────────────────────────
      #
      # GitHub Actions runners CANNOT reach IPv6 addresses.
      # Supabase direct hosts (db.*.supabase.co) resolve to IPv6 in ap-southeast-1.
      #
      # Fix A (preferred) — update DB_HOST secret to the SESSION pooler:
      #   DB_HOST     = aws-0-ap-southeast-1.pooler.supabase.com
      #   DB_PORT     = 5432
      #   DB_USERNAME = postgres.<PROJECT_REF>   ← project ref required for pooler
      #
      # Fix B (automatic, used here) — resolve the configured host to its IPv4
      # address so pg_dump never dials IPv6, regardless of the secret value.
      #
      - name: Resolve DB host to IPv4
        run: |
          CONFIGURED_HOST="${{ secrets.DB_HOST }}"
          # Try to get an IPv4 address for the host
          RESOLVED=$(getent ahostsv4 "$CONFIGURED_HOST" 2>/dev/null | awk 'NR==1{print $1}')

          if [ -n "$RESOLVED" ]; then
            echo "DB_CONNECT_HOST=${RESOLVED}" >> "$GITHUB_ENV"
            echo "✅ Resolved ${CONFIGURED_HOST} → ${RESOLVED} (IPv4)"
          else
            # No IPv4 record — fall back to hostname and hope for the best,
            # but print a clear warning so the operator knows to update DB_HOST
            echo "DB_CONNECT_HOST=${CONFIGURED_HOST}" >> "$GITHUB_ENV"
            echo "⚠️  Could not resolve ${CONFIGURED_HOST} to IPv4."
            echo "   Update DB_HOST to the Supabase SESSION pooler:"
            echo "   aws-0-ap-southeast-1.pooler.supabase.com"
          fi

      # ── 3. Dump the database ─────────────────────────────────────────────────
      - name: Create compressed backup
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
          FILENAME="myskoolz_${TIMESTAMP}.dump"

          pg_dump \
            --host="${DB_CONNECT_HOST}" \
            --port="${{ secrets.DB_PORT }}" \
            --username="${{ secrets.DB_USERNAME }}" \
            --dbname="${{ secrets.DB_NAME }}" \
            --no-password \
            --format=custom \
            --compress=9 \
            --verbose \
            --file="${FILENAME}"

          # Print backup size for the log
          SIZE=$(du -sh "${FILENAME}" | cut -f1)
          echo "BACKUP_FILE=${FILENAME}" >> "$GITHUB_ENV"
          echo "BACKUP_SIZE=${SIZE}"     >> "$GITHUB_ENV"
          echo "✅ Backup created: ${FILENAME} (${SIZE})"

      # ── 4. Upload to Backblaze B2 ─────────────────────────────────────────────
      #
      # Backblaze B2 is S3-compatible, so we reuse the AWS CLI that is
      # pre-installed on every GitHub Actions runner.
      #
      # B2 endpoint format: https://s3.<region>.backblazeb2.com
      # Find your region in the B2 bucket details page (e.g. us-west-004).
      #
      - name: Upload to B2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          aws s3 cp "$BACKUP_FILE" \
            "s3://${{ secrets.B2_BUCKET_NAME }}/backups/${BACKUP_FILE}" \
            --endpoint-url "${{ secrets.B2_ENDPOINT }}" \
            --no-progress

          echo "✅ Uploaded to B2: backups/${BACKUP_FILE} (${BACKUP_SIZE})"

      # ── 5. Delete backups older than 30 days from B2 ─────────────────────────
      #
      # Keeps your B2 bucket clean. Lists all objects, finds ones older than
      # 30 days, and deletes them one by one.
      #
      - name: Prune backups older than 30 days
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          CUTOFF=$(date -d '30 days ago' +%s)

          aws s3api list-objects \
            --bucket "${{ secrets.B2_BUCKET_NAME }}" \
            --prefix "backups/" \
            --endpoint-url "${{ secrets.B2_ENDPOINT }}" \
            --query 'Contents[].{Key: Key, LastModified: LastModified}' \
            --output json \
          | jq -r '.[] | "\(.LastModified) \(.Key)"' \
          | while read -r MODIFIED KEY; do
              FILE_TIME=$(date -d "$MODIFIED" +%s)
              if [ "$FILE_TIME" -lt "$CUTOFF" ]; then
                aws s3 rm \
                  "s3://${{ secrets.B2_BUCKET_NAME }}/${KEY}" \
                  --endpoint-url "${{ secrets.B2_ENDPOINT }}"
                echo "🗑️  Deleted old backup: ${KEY}"
              fi
            done

          echo "✅ Pruning complete"

      # ── 6. Summary ───────────────────────────────────────────────────────────
      - name: Print summary
        if: success()
        run: |
          echo "============================================"
          echo "  My-Skoolz Database Backup — SUCCESS"
          echo "============================================"
          echo "  File   : ${BACKUP_FILE}"
          echo "  Size   : ${BACKUP_SIZE}"
          echo "  Bucket : ${{ secrets.B2_BUCKET_NAME }}/backups/"
          echo "  Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "============================================"

      # ── 7. Notify on failure via email (GitHub built-in) ─────────────────────
      #
      # GitHub automatically emails the repo owner when a scheduled workflow
      # fails — no extra setup needed.  The step below just makes the failure
      # reason visible in the Actions log.
      #
      - name: Log failure reason
        if: failure()
        run: |
          echo "❌ Backup FAILED at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Check the logs above for the exact error."
          echo "GitHub will send a failure email to the repo owner automatically."
