# ============================================
# SCHOOLERS - Spring Boot Application Config
# ============================================

# Server Port
server.port=8080

# ============================================
# Google Cloud / BigQuery Configuration
# ============================================
gcp.project.id=${GCP_PROJECT_ID:project-0fa73af5-195e-4b08-b24}
gcp.bigquery.dataset=${BQ_DATASET:School}

# Path to GCP service account key JSON (leave blank when using ADC / Cloud Run)
# Set GOOGLE_APPLICATION_CREDENTIALS env var to the path of your service account key file
# e.g. export GOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:schoolers_jwt_secret_key_2024_secure_random_string_min_256_bits}
jwt.expiration=86400000

# ============================================
# Multipart File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================================
# HTTP Request Body Size (for base64 documents in JSON)
# ============================================
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=-1

# ============================================
# Logging
# ============================================
logging.level.com.schoolers=DEBUG
logging.level.org.springframework.security=INFO
logging.level.com.google.cloud.bigquery=INFO

# ============================================
# Jackson (JSON)
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# Disable JPA/DataSource (using BigQuery only)
# ============================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
spring.data.jpa.repositories.enabled=false

# ============================================
# App Name
# ============================================
spring.application.name=schoolers-backend
