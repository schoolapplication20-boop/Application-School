# ============================================
# SCHOOLERS - Spring Boot Application Config
# ============================================

# Server Port
server.port=8080

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/schoolers_db
spring.datasource.username=postgres
spring.datasource.password=postgres123
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:schoolers_jwt_secret_key_2024_secure_random_string_min_256_bits}
jwt.expiration=86400000

# ============================================
# Multipart File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================================
# HTTP Request Body Size (for base64 documents in JSON)
# ============================================
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=-1

# ============================================
# Logging
# ============================================
logging.level.com.schoolers=DEBUG
logging.level.org.springframework.security=INFO

# ============================================
# Jackson (JSON)
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# App Name
# ============================================
spring.application.name=schoolers-backend
