# ============================================
# SCHOOLERS - Spring Boot Application Config
# ============================================

# Server Port
server.port=${PORT:8080}

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HikariCP Connection Pool
# Free tier (Supabase free): DB_POOL_SIZE=5
# Paid tier (Supabase Pro):  DB_POOL_SIZE=15
# ============================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / Hibernate
# ============================================
# 'update' lets Hibernate add new columns automatically (safe — never drops).
# Set DDL_AUTO=validate on Render only AFTER confirming all columns exist.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=7200000

# ============================================
# CORS — set CORS_ALLOWED_ORIGINS on Render (comma-separated production URLs)
# When not set, localhost dev origins are added automatically
# ============================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}

# ============================================
# Multipart File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# Cloudinary (logo / image storage)
# Set CLOUDINARY_URL on Railway:
#   cloudinary://API_KEY:API_SECRET@CLOUD_NAME
# ============================================
cloudinary.url=${CLOUDINARY_URL:}

# ============================================
# HTTP Request Body Size (for base64 documents in JSON)
# ============================================
server.tomcat.max-http-form-post-size=5MB
server.tomcat.max-swallow-size=5MB

# ============================================
# Logging — configured in logback-spring.xml
# Set LOG_LEVEL=INFO and LOG_FORMAT=json on Railway for structured logging.
# ============================================

# ============================================
# Jackson (JSON)
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# Resend Email API (replaces Gmail SMTP — works on Render free tier)
# ============================================
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ============================================
# Groq AI (free tier - no payment needed)
# Get your free key at: https://console.groq.com/keys
# Set GROQ_API_KEY on Render
# ============================================
groq.api.key=${GROQ_API_KEY:}

# ============================================
# WhatsApp Notifications (CallMeBot free API)
# Setup: https://www.callmebot.com/blog/free-api-whatsapp-messages/
# Set WHATSAPP_API_KEY on Render after completing one-time opt-in
# ============================================
whatsapp.phone=${WHATSAPP_PHONE:}
whatsapp.api.key=${WHATSAPP_API_KEY:}

# ============================================
# WhatsApp Cloud API (Meta) — Auto-replies
# Set these on Render after completing Meta setup:
#   WHATSAPP_CLOUD_TOKEN       = your access token from Meta API Setup
#   WHATSAPP_PHONE_NUMBER_ID   = Phone Number ID from Meta API Setup
#   WHATSAPP_VERIFY_TOKEN      = secret string you set during webhook setup
# ============================================
whatsapp.cloud.token=${WHATSAPP_CLOUD_TOKEN:}
whatsapp.cloud.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.cloud.verify.token=${WHATSAPP_VERIFY_TOKEN:}
whatsapp.cloud.app.secret=${WHATSAPP_APP_SECRET:}

# ============================================
# App Name
# ============================================
spring.application.name=schoolers-backend

# ============================================
# App base URL (used for parent acknowledge email links)
# ============================================
app.base.url=${APP_BASE_URL:https://my-skoolz.com}
