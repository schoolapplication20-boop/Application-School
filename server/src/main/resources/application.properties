# ============================================
# SCHOOLERS - Spring Boot Application Config
# ============================================

# Server Port
server.port=${PORT:8080}

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HikariCP Connection Pool
# Free tier (Supabase free): DB_POOL_SIZE=5
# Paid tier (Supabase Pro):  DB_POOL_SIZE=15
# ============================================
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# ============================================
# SQL init: runs BEFORE JPA validation (spring.jpa.defer-datasource-initialization
# defaults to false, so these scripts execute before the EntityManagerFactory).
# Adds any columns the entity model expects but the DB may not have yet.
#
# LEGACY — frozen. New schema changes go through Flyway (db/migration/) instead.
# ============================================
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/pre-validate.sql

# ============================================
# Flyway: versioned DB migrations.
# The existing production schema (already fully shaped by the legacy
# pre-validate.sql + DatabaseMigration.java scripts) predates Flyway, so
# baseline-on-migrate marks it as baseline version 0 on first run — no
# migrations are replayed against it. V1__baseline.sql (a no-op marker)
# and any V2+ migrations then apply normally on top.
# ============================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-description=Legacy schema (pre-validate.sql + DatabaseMigration.java)
spring.flyway.locations=classpath:db/migration

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=7200000

# ============================================
# CORS — set CORS_ALLOWED_ORIGINS on Railway (comma-separated production URLs)
# When not set, localhost dev origins are added automatically
# ============================================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:}

# ============================================
# Multipart File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# Cloudinary (logo / image storage)
# Set CLOUDINARY_URL on Railway:
#   cloudinary://API_KEY:API_SECRET@CLOUD_NAME
# ============================================
cloudinary.url=${CLOUDINARY_URL:}

# ============================================
# HTTP Request Body Size (for base64 documents in JSON)
# ============================================
server.tomcat.max-http-form-post-size=5MB
server.tomcat.max-swallow-size=5MB

# ============================================
# Logging — configured in logback-spring.xml
# Set LOG_LEVEL=INFO and LOG_FORMAT=json on Railway for structured logging.
# ============================================

# ============================================
# Jackson (JSON)
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# Resend Email API (replaces Gmail SMTP — works on Railway free tier)
# ============================================
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ============================================
# Groq AI (free tier - no payment needed)
# Get your free key at: https://console.groq.com/keys
# Set GROQ_API_KEY on Railway
# ============================================
groq.api.key=${GROQ_API_KEY:}

# ============================================
# WhatsApp Notifications (CallMeBot free API)
# Setup: https://www.callmebot.com/blog/free-api-whatsapp-messages/
# Set WHATSAPP_API_KEY on Railway after completing one-time opt-in
# ============================================
whatsapp.phone=${WHATSAPP_PHONE:}
whatsapp.api.key=${WHATSAPP_API_KEY:}

# ============================================
# WhatsApp Cloud API (Meta) — Auto-replies
# Set these on Railway after completing Meta setup:
#   WHATSAPP_CLOUD_TOKEN       = your access token from Meta API Setup
#   WHATSAPP_PHONE_NUMBER_ID   = Phone Number ID from Meta API Setup
#   WHATSAPP_VERIFY_TOKEN      = secret string you set during webhook setup
# ============================================
whatsapp.cloud.token=${WHATSAPP_CLOUD_TOKEN:}
whatsapp.cloud.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID:}
whatsapp.cloud.verify.token=${WHATSAPP_VERIFY_TOKEN:}
whatsapp.cloud.app.secret=${WHATSAPP_APP_SECRET:}

# ============================================
# SMS / Bulk SMS Notification Module
#
# sms.provider selects which adapter is active ("msg91" or "twilio") — exactly one
# SmsProvider bean is registered based on this value.
#
# Default provider is MSG91 (DLT-compliant, required for SMS to Indian numbers):
#   Set MSG91_AUTH_KEY, MSG91_SENDER_ID (6-char DLT-registered alphanumeric sender ID) and
#   MSG91_DLT_TE_ID (DLT-approved template ID for the configured route) on Railway.
#   MSG91_WEBHOOK_BASE_URL/MSG91_WEBHOOK_SECRET enable delivery tracking — configure
#   {base}/api/sms/webhook/msg91/status?token={secret} as the DLR callback URL in the
#   MSG91 dashboard (Settings > API > DLR URL).
#
# To use Twilio instead, set SMS_PROVIDER=twilio and TWILIO_ACCOUNT_SID, TWILIO_AUTH_TOKEN,
# and either TWILIO_FROM_NUMBER or TWILIO_MESSAGING_SERVICE_SID. TWILIO_WEBHOOK_BASE_URL
# should be the public base URL of this server so Twilio can call back
# /api/sms/webhook/twilio/status with delivery updates.
# ============================================
sms.provider=${SMS_PROVIDER:msg91}

msg91.auth.key=${MSG91_AUTH_KEY:}
msg91.sender.id=${MSG91_SENDER_ID:}
msg91.route=${MSG91_ROUTE:4}
msg91.dlt.te.id=${MSG91_DLT_TE_ID:}
msg91.country.code=${MSG91_COUNTRY_CODE:91}
msg91.webhook.base.url=${MSG91_WEBHOOK_BASE_URL:}
msg91.webhook.secret=${MSG91_WEBHOOK_SECRET:}

twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.from.number=${TWILIO_FROM_NUMBER:}
twilio.messaging.service.sid=${TWILIO_MESSAGING_SERVICE_SID:}
twilio.webhook.base.url=${TWILIO_WEBHOOK_BASE_URL:}

encryption.key=${ENCRYPTION_KEY:my-skoolz-local-dev-key}

sms.queue.batch.size=${SMS_QUEUE_BATCH_SIZE:20}
sms.queue.poll.interval.ms=${SMS_QUEUE_POLL_INTERVAL_MS:15000}
sms.max.retry.attempts=${SMS_MAX_RETRY_ATTEMPTS:3}
sms.default.country.code=${SMS_DEFAULT_COUNTRY_CODE:+91}

# ============================================
# App Name
# ============================================
spring.application.name=schoolers-backend

# ============================================
# App base URL (used for parent acknowledge email links)
# ============================================
app.base.url=${APP_BASE_URL:https://my-skoolz.com}
