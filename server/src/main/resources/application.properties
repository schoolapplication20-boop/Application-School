# ============================================
# SCHOOLERS - Spring Boot Application Config
# ============================================

# Server Port
server.port=${PORT:8080}

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HikariCP Connection Pool (Supabase free tier limit = 15 total)
# ============================================
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ============================================
# Multipart File Upload
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ============================================
# HTTP Request Body Size (for base64 documents in JSON)
# ============================================
server.tomcat.max-http-form-post-size=20MB
server.tomcat.max-swallow-size=-1

# ============================================
# Logging
# ============================================
logging.level.com.schoolers=DEBUG
logging.level.org.springframework.security=INFO

# ============================================
# Jackson (JSON)
# ============================================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ============================================
# Resend Email API (replaces Gmail SMTP — works on Render free tier)
# ============================================
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}

# ============================================
# Google Gemini AI (free tier — set GEMINI_API_KEY on Render)
# Get your free key at: https://aistudio.google.com/app/apikey
# ============================================
gemini.api.key=${GEMINI_API_KEY:}

# ============================================
# App Name
# ============================================
spring.application.name=schoolers-backend
