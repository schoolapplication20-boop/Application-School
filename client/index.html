<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- ── Viewport ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Theme / Status Bar ── -->
    <meta name="theme-color" content="#2563EB" />
    <meta name="msapplication-TileColor" content="#2563EB" />
    <meta name="msapplication-TileImage" content="/logo.svg" />

    <!-- ── iOS / Safari PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My-Skoolz" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <!-- Splash screens: iOS uses background-color from manifest, no separate images needed -->

    <title>My-Skoolz — School Management System | School Software India</title>
    <meta name="description" content="My-Skoolz is an all-in-one school management system for Indian schools. Manage students, fees, teachers, attendance, and more — from any device. Book a free demo today." />
    <meta name="keywords" content="school management system, school software India, school ERP, school application software, fee management, student management, attendance tracking, school administration software" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="My-Skoolz" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="My-Skoolz" />
    <meta property="og:title" content="My-Skoolz — School Management System" />
    <meta property="og:description" content="All-in-one cloud-based school management platform for Indian schools. Admissions, fees, attendance, and more." />
    <meta property="og:url" content="https://my-skoolz.com" />
    <meta property="og:image" content="https://my-skoolz.com/logo.svg" />
    <meta property="og:image:width" content="200" />
    <meta property="og:image:height" content="200" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://my-skoolz.com/logo.svg" />
    <!-- Sitemap -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // In production, silently log errors rather than destroying the page.
      // The React ErrorBoundary handles recoverable component errors gracefully.
      var _isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (!_isDev) {
        window.addEventListener('error', function(e) {
          console.error('[GlobalError]', e.message, e.filename + ':' + e.lineno);
        });
        window.addEventListener('unhandledrejection', function(e) {
          console.error('[UnhandledRejection]', e.reason);
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
