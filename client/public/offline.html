<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Connection — My-Skoolz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', 'Inter', system-ui, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e3a8a 55%, #312e81 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 8px 32px rgba(37,99,235,.4);
    }

    /* Graduation cap SVG inline */
    .logo-wrap svg { width: 56px; height: 56px; }

    .wifi-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      opacity: .6;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      color: rgba(255,255,255,.65);
      font-size: .95rem;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: linear-gradient(135deg, #2563EB, #7C3AED);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(37,99,235,.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37,99,235,.5);
    }

    .brand {
      margin-top: 40px;
      font-size: .8rem;
      color: rgba(255,255,255,.3);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 39 Q14 33 20 33 Q26 33 32 39" fill="white" fill-opacity="0.58"/>
        <circle cx="20" cy="26" r="9" fill="white" fill-opacity="0.92"/>
        <path d="M7 17 L20 11 L33 17 L20 23 Z" fill="white"/>
        <line x1="33" y1="17" x2="33" y2="25" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.72"/>
        <circle cx="33" cy="26.5" r="2" fill="white" opacity="0.72"/>
      </svg>
    </div>

    <span class="wifi-icon">📡</span>

    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.<br />
      Please check your network and try again.
    </p>

    <button class="btn" onclick="window.location.reload()">
      ↺ &nbsp;Try Again
    </button>

    <p class="brand">My-Skoolz — School Management</p>
  </div>
</body>
</html>
